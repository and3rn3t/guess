name: Setup Node + pnpm
description: Checkout, install pnpm, set up Node 24 with pnpm cache, and install dependencies.

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: pnpm
    - run: pnpm install --frozen-lockfile
      shell: bash
