name: Setup Node + pnpm
description: Checkout, install pnpm, set up Node 22 with pnpm cache, and install dependencies.

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm
    - run: pnpm install --frozen-lockfile
      shell: bash
