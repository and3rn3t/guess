name: Engine Regression Gate

on:
  push:
    branches: [main]
    paths:
      - "packages/game-engine/**"
      - "scripts/simulate/**"
      - "functions/api/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/game-engine/**"
      - "scripts/simulate/**"
      - "functions/api/**"

concurrency:
  group: engine-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    name: Simulator regression gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      # characters.json + questions.json are gitignored (too large).
      # Export them from production D1 so regression always runs in CI.
      - name: Export simulation data from D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm simulate:export --env production

      # baseline.jsonl must be committed — fail hard if missing.
      - name: Verify baseline exists
        run: |
          if [ ! -f scripts/simulate/baseline.jsonl ]; then
            echo "::error::scripts/simulate/baseline.jsonl is not committed."
            echo "Run \`pnpm simulate:regression --update-baseline\` and commit the file."
            exit 1
          fi

      - name: Run regression gate
        run: pnpm simulate:regression
