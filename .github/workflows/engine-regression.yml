name: Engine Regression Gate

on:
  push:
    branches: [main]
    paths:
      - "packages/game-engine/**"
      - "scripts/simulate/**"
      - "functions/api/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/game-engine/**"
      - "scripts/simulate/**"
      - "functions/api/**"

concurrency:
  group: engine-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    name: Simulator regression gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      # characters.json + questions.json are gitignored (too large for git).
      # regression.ts automatically falls back to scripts/simulate/ci-data/ (committed
      # top-2000 snapshot) when the live-exported data/ is absent.
      # Refresh the snapshot locally with:
      #   pnpm simulate:export && pnpm simulate:regression --update-baseline
      # then commit scripts/simulate/ci-data/ and scripts/simulate/baseline.jsonl.

      # baseline.jsonl must be committed — fail hard if missing.
      - name: Verify baseline exists
        run: |
          if [ ! -f scripts/simulate/baseline.jsonl ]; then
            echo "::error::scripts/simulate/baseline.jsonl is not committed."
            echo "Run \`pnpm simulate:regression --update-baseline\` and commit the file."
            exit 1
          fi

      - name: Run regression gate
        run: pnpm simulate:regression
