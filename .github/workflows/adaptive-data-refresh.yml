name: Adaptive Data Refresh

# Refreshes simulation-derived adaptive data in production KV:
#   kv:attribute-maybe-rates     — per-attribute maybe-answer rates
#   kv:attribute-net-gains       — per-attribute average information gain
#   kv:confusion-discriminators  — discriminating questions for confused character pairs
#
# Runs weekly (Sunday 02:00 UTC) and on-demand via workflow_dispatch.
# Requires secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID

on:
  schedule:
    - cron: "0 2 * * 0" # Sunday 02:00 UTC
  workflow_dispatch:
    inputs:
      sample:
        description: "Games per difficulty (default: 100)"
        required: false
        default: "100"

concurrency:
  group: adaptive-data-refresh
  cancel-in-progress: true # only one refresh at a time

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  refresh:
    name: Refresh adaptive data
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 1. Export character + question data from production D1 ──────────────
      - name: Export simulation data from D1
        run: pnpm simulate:export --env production

      # ── 2. Run simulations across all three difficulties ────────────────────
      # Uses parallel workers (--parallel) for speed.
      # Sample size is intentionally small (default 100/difficulty = 300 total)
      # to keep CI runtime under ~15 min. Increase via workflow_dispatch input.
      - name: Run simulations (easy)
        run: |
          SAMPLE=${{ github.event.inputs.sample || '100' }}
          pnpm simulate \
            --sample "$SAMPLE" \
            --difficulty easy \
            --parallel \
            --output scripts/simulate/data/results-ci-easy.jsonl

      - name: Run simulations (medium)
        run: |
          SAMPLE=${{ github.event.inputs.sample || '100' }}
          pnpm simulate \
            --sample "$SAMPLE" \
            --difficulty medium \
            --parallel \
            --output scripts/simulate/data/results-ci-medium.jsonl

      - name: Run simulations (hard)
        run: |
          SAMPLE=${{ github.event.inputs.sample || '100' }}
          pnpm simulate \
            --sample "$SAMPLE" \
            --difficulty hard \
            --parallel \
            --output scripts/simulate/data/results-ci-hard.jsonl

      # ── 3. Merge results and compute adaptive data ──────────────────────────
      - name: Merge simulation results
        run: |
          cat \
            scripts/simulate/data/results-ci-easy.jsonl \
            scripts/simulate/data/results-ci-medium.jsonl \
            scripts/simulate/data/results-ci-hard.jsonl \
          > scripts/simulate/data/results-ci-all.jsonl
          echo "Total games: $(wc -l < scripts/simulate/data/results-ci-all.jsonl)"

      - name: Compute maybe-rates
        run: pnpm simulate:maybe-rates --input "$PWD/scripts/simulate/data/results-ci-all.jsonl"

      - name: Compute net-gains
        run: pnpm simulate:net-gains --input "$PWD/scripts/simulate/data/results-ci-all.jsonl"

      - name: Compute confusion-discriminators
        run: pnpm simulate:confusion-pairs --input "$PWD/scripts/simulate/data/results-ci-all.jsonl"

      # ── 4. Upload to production KV ──────────────────────────────────────────
      - name: Upload maybe-rates to KV
        run: |
          npx wrangler kv key put \
            --binding GUESS_KV \
            --path scripts/simulate/data/maybe-rates.json \
            --env production \
            --remote \
            "kv:attribute-maybe-rates"

      - name: Upload net-gains to KV
        run: |
          npx wrangler kv key put \
            --binding GUESS_KV \
            --path scripts/simulate/data/net-gains.json \
            --env production \
            --remote \
            "kv:attribute-net-gains"

      - name: Upload confusion-discriminators to KV
        run: |
          npx wrangler kv key put \
            --binding GUESS_KV \
            --path scripts/simulate/data/confusion-discriminators.json \
            --env production \
            --remote \
            "kv:confusion-discriminators"

      # ── 5. Summary ──────────────────────────────────────────────────────────
      - name: Print summary
        run: |
          echo "### Adaptive Data Refresh" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          for f in maybe-rates net-gains confusion-discriminators; do
            SIZE=$(wc -c < "scripts/simulate/data/${f}.json")
            echo "| ${f}.json | ${SIZE} bytes |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Uploaded to: \`kv:attribute-maybe-rates\`, \`kv:attribute-net-gains\`, \`kv:confusion-discriminators\`" >> "$GITHUB_STEP_SUMMARY"
