name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: tsc -b

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Check bundle size
        run: |
          MAX_KB=700
          LARGEST=$(find dist/assets -name '*.js' -exec du -k {} + | sort -rn | head -1 | awk '{print $1}')
          echo "Largest JS chunk: ${LARGEST}KB (limit: ${MAX_KB}KB)"
          if [ "$LARGEST" -gt "$MAX_KB" ]; then
            echo "::error::Bundle size ${LARGEST}KB exceeds ${MAX_KB}KB limit"
            exit 1
          fi
