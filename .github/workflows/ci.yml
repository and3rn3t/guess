name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
      - ".husky/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
      - ".husky/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect which parts of the codebase changed ─────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      frontend: ${{ steps.filter.outputs.frontend }}
      db: ${{ steps.filter.outputs.db }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - 'src/**'
              - 'functions/**'
              - 'packages/**'
              - 'public/**'
              - 'e2e/**'
              - 'playwright.config.ts'
              - 'index.html'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.ts'
              - 'tsconfig.json'
              - 'tailwind.config.js'
              - 'components.json'
              - 'wrangler.toml'
            frontend:
              - 'src/**'
              - 'packages/**'
              - 'e2e/**'
              - 'playwright.config.ts'
              - 'public/**'
              - 'index.html'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.ts'
              - 'tsconfig.json'
              - 'tailwind.config.js'
              - 'components.json'
            db:
              - 'migrations/**'
              - 'functions/api/_db-types.ts'
              - 'scripts/generate-db-types.ts'

  # ── Lint + type-check + tests (merged to share install) ──────
  checks:
    needs: [changes]
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm lint
      - run: tsc -b
      - run: pnpm test

  test-e2e:
    needs: [changes, build]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium firefox
      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium firefox
      - run: npx playwright test
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    needs: [changes]
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm build

      - name: Check bundle size
        run: |
          MAX_KB=600
          LARGEST=$(find dist/assets -name '*.js' -exec du -k {} + | sort -rn | head -1 | awk '{print $1}')
          echo "Largest JS chunk: ${LARGEST}KB (limit: ${MAX_KB}KB)"
          if [ "$LARGEST" -gt "$MAX_KB" ]; then
            echo "::error::Bundle size ${LARGEST}KB exceeds ${MAX_KB}KB limit"
            exit 1
          fi

      - name: Check named chunk budgets
        run: pnpm size

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 3

  # ── DB type drift check (DX.11) ────────────────────────────
  db-drift:
    needs: [changes]
    if: needs.changes.outputs.db == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Regenerate DB types
        run: pnpm db:types
      - name: Check for drift
        run: |
          if ! git diff --exit-code functions/api/_db-types.ts; then
            echo "::error::Generated DB types (functions/api/_db-types.ts) are out of sync with the schema. Run 'pnpm db:types' and commit the result."
            exit 1
          fi

  # ── Deploy preview (PRs) ────────────────────────────────────
  deploy-preview:
    needs: [checks, build, test-e2e]
    if: |
      github.event_name == 'pull_request' &&
      needs.checks.result == 'success' &&
      needs.build.result == 'success' &&
      (needs.test-e2e.result == 'success' || needs.test-e2e.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Deploy to Cloudflare Pages (preview)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.83.0"
          command: pages deploy dist --project-name=guess --branch=${{ github.head_ref }}

      - name: Smoke test
        run: |
          URL="${{ steps.deploy.outputs.deployment-url }}"
          echo "Smoke-testing $URL …"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /tmp/body -w '%{http_code}' "$URL")
            if [ "$STATUS" = "200" ]; then break; fi
            echo "  Attempt $i: HTTP $STATUS — retrying in 5s"
            sleep 5
          done
          if [ "$STATUS" != "200" ]; then
            echo "::error::Smoke test failed — HTTP $STATUS"
            exit 1
          fi
          if grep -q 'id="root"' /tmp/body; then
            echo "✓ App shell OK"
          else
            echo "::error::Root element not found in response"
            exit 1
          fi

    outputs:
      url: ${{ steps.deploy.outputs.deployment-url }}

  # ── Deploy production (push to main) ────────────────────────
  deploy-production:
    needs: [checks, build, test-e2e]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.checks.result == 'success' &&
      needs.build.result == 'success' &&
      (needs.test-e2e.result == 'success' || needs.test-e2e.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: https://guess.andernet.dev
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.83.0"
          command: pages deploy dist --project-name=guess

      - name: Smoke test
        run: |
          URL="https://guess.andernet.dev"
          echo "Smoke-testing $URL …"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /tmp/body -w '%{http_code}' "$URL")
            if [ "$STATUS" = "200" ]; then break; fi
            echo "  Attempt $i: HTTP $STATUS — retrying in 10s"
            sleep 10
          done
          if [ "$STATUS" != "200" ]; then
            echo "::error::Smoke test failed — HTTP $STATUS"
            exit 1
          fi
          if grep -q 'id="root"' /tmp/body; then
            echo "✓ App shell OK"
          else
            echo "::error::Root element not found in response"
            exit 1
          fi

  # ── PR report (bundle stats + preview link) ─────────────────
  pr-report:
    needs: [deploy-preview]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Post PR comment
        uses: actions/github-script@v9
        env:
          PREVIEW_URL: ${{ needs.deploy-preview.outputs.url }}
        with:
          script: |
            const { execSync } = require('child_process');
            const url = process.env.PREVIEW_URL;

            const jsRaw = execSync("find dist/assets -name '*.js' -exec du -k {} +")
              .toString().trim();
            const jsFiles = jsRaw.split('\n').map(l => {
              const [size, file] = l.split('\t');
              return { size: +size, name: file.split('/').pop() };
            }).sort((a, b) => b.size - a.size);

            const totalJs = jsFiles.reduce((s, f) => s + f.size, 0);
            let totalCss = 0;
            try {
              totalCss = execSync("find dist/assets -name '*.css' -exec du -k {} +")
                .toString().trim().split('\n')
                .reduce((s, l) => s + parseInt(l.split('\t')[0]), 0);
            } catch {}

            const breakdown = jsFiles
              .map(f => `| \`${f.name}\` | ${f.size}KB |`).join('\n');

            const body = [
              '## 📦 Deploy Preview',
              '',
              `🔗 **${url}**`,
              '',
              '### Bundle Size',
              '| Metric | Size |',
              '|--------|------|',
              `| Total JS | **${totalJs}KB** |`,
              `| Total CSS | **${totalCss}KB** |`,
              `| Largest chunk | **${jsFiles[0]?.size ?? 0}KB** (limit: 600KB) |`,
              '',
              '<details><summary>JS chunk breakdown</summary>',
              '',
              '| File | Size |',
              '|------|------|',
              breakdown,
              '',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.body?.startsWith('## 📦 Deploy Preview'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ── Lighthouse CI (non-blocking) ────────────────────────────
  lighthouse:
    needs: deploy-preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ needs.deploy-preview.outputs.url }}
          uploadArtifacts: true
          temporaryPublicStorage: true
