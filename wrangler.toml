#:schema node_modules/wrangler/config-schema.json

name = "guess"
compatibility_date = "2025-04-01"
pages_build_output_dir = "./dist"

# Cloudflare Pages static site deployment
# Build: pnpm build (outputs to dist/)
# Deploy: pnpm run deploy

# Cloudflare KV for global character/question pool, stats, and caching.
# Create the namespace: wrangler kv namespace create GUESS_KV
# Then paste the generated id below.
[[kv_namespaces]]
binding = "GUESS_KV"
id = "placeholder-create-with-wrangler-kv-namespace-create"
