#:schema node_modules/wrangler/config-schema.json

name = "guess"
compatibility_date = "2026-04-01"
pages_build_output_dir = "./dist"

[observability]
enabled = true

# Custom domain: andernator.com (configured in Cloudflare Pages dashboard)
# DNS: CNAME andernator.com → guess.pages.dev

# Cloudflare Pages static site deployment
# Build: pnpm build (outputs to dist/)
# Deploy: pnpm run deploy

# ── Production ────────────────────────────────────────────────
[env.production]

[env.production.vars]
# Cloudflare AI Gateway — proxies OpenAI calls with built-in caching,
# rate limiting, logging, cost analytics, and fallbacks.
CLOUDFLARE_AI_GATEWAY = "https://gateway.ai.cloudflare.com/v1/362c458c58efc6b65b7005148383403d/andernet-ai/openai/chat/completions"

[[env.production.kv_namespaces]]
binding = "GUESS_KV"
id = "801438ecdbc44c05afd42bf4e764dd78"

[[env.production.d1_databases]]
binding = "GUESS_DB"
database_name = "guess-db"
database_id = "1ec6e6bd-56be-4ab6-9d90-09a15243154f"
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "GUESS_IMAGES"
bucket_name = "guess-images"

# ── Preview / Development ─────────────────────────────────────
# Isolated KV so preview experiments never touch production data.
[env.preview]

[env.preview.vars]
# Uses same AI Gateway for preview — switch to a separate gateway if needed.
CLOUDFLARE_AI_GATEWAY = "https://gateway.ai.cloudflare.com/v1/362c458c58efc6b65b7005148383403d/andernet-ai/openai/chat/completions"

[[env.preview.kv_namespaces]]
binding = "GUESS_KV"
id = "96c1143288174dd5891e344a46e565c6"

[[env.preview.d1_databases]]
binding = "GUESS_DB"
database_name = "guess-db-preview"
database_id = "a02a0492-36d2-4513-8270-82a3467914de"
migrations_dir = "migrations"

[[env.preview.r2_buckets]]
binding = "GUESS_IMAGES"
bucket_name = "guess-images"
